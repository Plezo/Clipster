name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast job: builds the platform-agnostic core and runs the unit tests.
  # Keeps the Linux port honest long before the Linux backends exist.
  linux-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset linux-core

      - name: Build
        run: cmake --build --preset linux-core --parallel

      - name: Test
        run: ctest --preset linux-core

  # Full build: core + FFmpeg media layer + Windows platform layer + CLI.
  windows:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          fetch-depth: 1

      - name: Bootstrap vcpkg
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat
        shell: cmd

      # Lets vcpkg cache built dependencies (FFmpeg takes a while) in the
      # GitHub Actions cache between runs.
      - name: Enable vcpkg GHA binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Configure
        run: cmake --preset windows

      - name: Build
        run: cmake --build --preset windows-release --parallel

      - name: Test
        run: ctest --preset windows

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: clipster-windows-x64
          path: |
            build/windows/apps/cli/RelWithDebInfo/clipster.exe
            build/windows/apps/tray/RelWithDebInfo/clipster-tray.exe
            build/windows/apps/settings/RelWithDebInfo/clipster-settings.exe
          if-no-files-found: error
