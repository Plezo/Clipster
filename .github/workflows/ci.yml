name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast job: builds the platform-agnostic core and runs the unit tests.
  # Keeps the Linux port honest long before the Linux backends exist.
  linux-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset linux-core

      - name: Build
        run: cmake --build --preset linux-core --parallel

      - name: Test
        run: ctest --preset linux-core

  # Full build: core + FFmpeg media layer + Windows platform layer + CLI.
  windows:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          # Pinned to a commit verified to build this manifest (keep in sync
          # with release.yml). Bump deliberately, not implicitly.
          ref: f87344cac03158cbf1467264565f1fd36b382a24

      - name: Bootstrap vcpkg
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat
        shell: cmd

      # Lets vcpkg cache built dependencies (FFmpeg takes a while) in the
      # GitHub Actions cache between runs. ACTIONS_RESULTS_URL is the cache
      # v2 endpoint; ACTIONS_CACHE_URL is kept for older vcpkg tools.
      - name: Enable vcpkg GHA binary cache
        uses: actions/github-script@v7
        with:
          script: |
            for (const v of ['ACTIONS_CACHE_URL', 'ACTIONS_RESULTS_URL', 'ACTIONS_RUNTIME_TOKEN'])
              core.exportVariable(v, process.env[v] || '');

      # The windows-ci preset uses Ninja so the build works with whatever
      # Visual Studio the runner image ships (the VS2022 generator broke
      # when windows-latest moved to a newer VS). This puts cl.exe in the
      # environment for Ninja to find.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # --clean-after-build deletes each port's buildtree once it is
      # installed; FFmpeg+Qt buildtrees otherwise exhaust the runner disk.
      - name: Configure
        run: cmake --preset windows-ci -D "VCPKG_INSTALL_OPTIONS=--clean-after-build"

      - name: Upload dependency build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-failure-logs
          path: vcpkg/buildtrees/**/*.log
          if-no-files-found: ignore

      - name: Build
        run: cmake --build --preset windows-ci --parallel

      - name: Test
        run: ctest --preset windows-ci

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: clipster-windows-x64
          path: |
            build/windows-ci/apps/gui/Clipster.exe
            build/windows-ci/apps/cli/clipster-cli.exe
          if-no-files-found: error
