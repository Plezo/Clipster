name: Release

# Push a version tag to build and publish a ready-to-run zip:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write  # create the GitHub Release

jobs:
  release:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          # Pinned to a commit verified to build this manifest (keep in sync
          # with ci.yml). Bump deliberately, not implicitly.
          ref: f87344cac03158cbf1467264565f1fd36b382a24

      - name: Bootstrap vcpkg
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat
        shell: cmd

      - name: Enable vcpkg GHA binary cache
        uses: actions/github-script@v7
        with:
          script: |
            for (const v of ['ACTIONS_CACHE_URL', 'ACTIONS_RESULTS_URL', 'ACTIONS_RUNTIME_TOKEN'])
              core.exportVariable(v, process.env[v] || '');

      # Ninja works with whatever Visual Studio the runner ships (see ci.yml).
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      # --clean-after-build keeps the runner disk from filling up (see ci.yml).
      - name: Configure
        run: cmake --preset windows-ci -D "VCPKG_INSTALL_OPTIONS=--clean-after-build"

      - name: Upload dependency build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-failure-logs
          path: vcpkg/buildtrees/**/*.log
          if-no-files-found: ignore

      - name: Build
        run: cmake --build --preset windows-ci --parallel

      - name: Test
        run: ctest --preset windows-ci

      # The gui output dir holds the runnable layout (exe, DLLs, Qt plugin
      # dirs, assets) but with Ninja it also holds CMake build files, so
      # cherry-pick the runtime pieces. No *.pdb copied = symbols stripped.
      - name: Package
        shell: pwsh
        run: |
          $src = "build/windows-ci/apps/gui"
          $stage = "stage/Clipster"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "$src/*.exe", "$src/*.dll" $stage
          foreach ($dir in 'platforms', 'styles', 'imageformats', 'assets') {
            if (Test-Path "$src/$dir") { Copy-Item "$src/$dir" $stage -Recurse }
          }
          Copy-Item README.md, LICENSE $stage
          Compress-Archive -Path "stage/Clipster" `
            -DestinationPath "Clipster-$($env:GITHUB_REF_NAME)-windows-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Clipster-*-windows-x64.zip
          generate_release_notes: true
