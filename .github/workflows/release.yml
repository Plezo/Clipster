name: Release

# Push a version tag to build and publish a ready-to-run zip:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write  # create the GitHub Release

jobs:
  # scripts/release-local.ps1 publishes a release with assets before the
  # tag reaches CI; in that case the slow cloud build adds nothing.
  precheck:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.existing.outputs.skip }}
    steps:
      - name: Skip if the release already has assets
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
            --jq '.assets | length' 2>/dev/null || echo 0)
          echo "found $count existing assets for ${GITHUB_REF_NAME}"
          if [ "$count" -gt 0 ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; fi

  release:
    needs: precheck
    if: needs.precheck.outputs.skip != 'true'
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
    steps:
      - uses: actions/checkout@v4

      # The in-app update check compares the running version against the
      # latest tag, so a tag that doesn't match project(VERSION) would
      # nag users forever. Fail fast instead.
      - name: Check tag matches project version
        shell: pwsh
        run: |
          $tagVer = $env:GITHUB_REF_NAME.TrimStart('v')
          $projVer = (Select-String -Path CMakeLists.txt -Pattern 'VERSION (\d+\.\d+\.\d+)').Matches[0].Groups[1].Value
          if ($tagVer -ne $projVer) {
            Write-Output "::error::Tag $env:GITHUB_REF_NAME but CMakeLists.txt says VERSION $projVer. Bump project(VERSION) and re-tag."
            exit 1
          }

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          # Pinned to a commit verified to build this manifest (keep in sync
          # with ci.yml). Bump deliberately, not implicitly.
          ref: f87344cac03158cbf1467264565f1fd36b382a24

      - name: Bootstrap vcpkg
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat
        shell: cmd

      - name: Enable vcpkg GHA binary cache
        uses: actions/github-script@v7
        with:
          script: |
            for (const v of ['ACTIONS_CACHE_URL', 'ACTIONS_RESULTS_URL', 'ACTIONS_RUNTIME_TOKEN'])
              core.exportVariable(v, process.env[v] || '');

      # Ninja works with whatever Visual Studio the runner ships (see ci.yml).
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Ensure Ninja is installed
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }
          ninja --version

      # --clean-after-build keeps the runner disk from filling up; error
      # annotation makes the failure cause publicly visible (see ci.yml).
      - name: Configure
        shell: pwsh
        run: |
          # The VS developer environment points VCPKG_ROOT at VS's bundled
          # vcpkg; force it back to our pinned checkout.
          $env:VCPKG_ROOT = Join-Path $env:GITHUB_WORKSPACE 'vcpkg'
          $ninja = (Get-Command ninja).Source -replace '\\', '/'
          cmake --version
          where.exe cl
          cmake --preset windows-ci `
            -D "VCPKG_INSTALL_OPTIONS=--clean-after-build" `
            -D "CMAKE_MAKE_PROGRAM=$ninja" 2>&1 |
            Tee-Object configure.log
          if ($LASTEXITCODE -ne 0) {
            $tail = (Get-Content configure.log -Tail 40) -join '%0A'
            Write-Output "::error title=CMake configure failed::$tail"
            exit 1
          }

      - name: Upload dependency build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-failure-logs
          path: vcpkg/buildtrees/**/*.log
          if-no-files-found: ignore

      - name: Build
        run: cmake --build --preset windows-ci --parallel

      - name: Test
        run: ctest --preset windows-ci

      # The gui output dir holds the runnable layout (exe, DLLs, Qt plugin
      # dirs, assets) but with Ninja it also holds CMake build files, so
      # cherry-pick the runtime pieces. No *.pdb copied = symbols stripped.
      - name: Package
        shell: pwsh
        run: |
          $src = "build/windows-ci/apps/gui"
          $stage = "stage/Clipster"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "$src/*.exe", "$src/*.dll" $stage
          foreach ($dir in 'platforms', 'styles', 'imageformats', 'tls', 'assets') {
            if (Test-Path "$src/$dir") { Copy-Item "$src/$dir" $stage -Recurse }
          }
          Get-ChildItem $stage -Recurse -Filter *.pdb | Remove-Item
          Copy-Item README.md, LICENSE $stage
          Compress-Archive -Path "stage/Clipster" `
            -DestinationPath "Clipster-$($env:GITHUB_REF_NAME)-windows-x64.zip"

      # Single-file installer from the same staged files (Inno Setup is
      # preinstalled on the runner image).
      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = (Get-Command iscc.exe).Source }
          $ver = $env:GITHUB_REF_NAME.TrimStart('v')
          & $iscc "/DAppVersion=$ver" "/DStageDir=$PWD\stage\Clipster" `
            "/O$PWD" "/FClipster-Setup-$($env:GITHUB_REF_NAME)" installer\clipster.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Clipster-Setup-*.exe
            Clipster-*-windows-x64.zip
          generate_release_notes: true
