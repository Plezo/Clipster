name: Release

# Push a version tag to build and publish a ready-to-run zip:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write  # create the GitHub Release

jobs:
  release:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          fetch-depth: 1

      - name: Bootstrap vcpkg
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat
        shell: cmd

      - name: Enable vcpkg GHA binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Configure
        run: cmake --preset windows

      - name: Build
        run: cmake --build --preset windows-release --parallel

      - name: Test
        run: ctest --preset windows

      # The gui output dir is already a complete, runnable layout (exe,
      # DLLs, Qt plugins, assets); strip debug symbols and zip it.
      - name: Package
        shell: pwsh
        run: |
          $src = "build/windows/apps/gui/RelWithDebInfo"
          $stage = "stage/Clipster"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "$src/*" $stage -Recurse
          Get-ChildItem $stage -Recurse -Filter *.pdb | Remove-Item
          Copy-Item README.md, LICENSE $stage
          Compress-Archive -Path "stage/Clipster" `
            -DestinationPath "Clipster-$($env:GITHUB_REF_NAME)-windows-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Clipster-*-windows-x64.zip
          generate_release_notes: true
